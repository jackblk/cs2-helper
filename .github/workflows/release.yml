name: "release"

on:
  push:
    tags:
      - "*.*.*" # e.g. 0.1.0 — triggers a build + GitHub release for the pushed tag.

# Builds the app and uploads the bundles to a (draft) GitHub release for the tag.
# Windows-only for now.

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: install pnpm
        uses: pnpm/action-setup@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "CS2 Helper ${{ github.ref_name }}"
          releaseBody: "Homepage: https://jackblk.github.io/cs2-helper/. See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          assetNamePattern: "[name]-[arch][ext]"
